name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install deps
        working-directory: "Сайт с тренировкой"
        run: npm install

      - name: Build web
        working-directory: "Сайт с тренировкой"
        run: npm run build

      - name: Add Android platform
        working-directory: "Сайт с тренировкой"
        run: |
          if [ ! -d android ]; then
            npx cap add android
          fi

      - name: Sync Capacitor
        working-directory: "Сайт с тренировкой"
        run: npx cap sync android

      - name: Prepare release signing
        # Важно: работаем в папке android/app, чтобы файл ключа лег рядом с build.gradle
        working-directory: "Сайт с тренировкой/android/app"
        env:
          # Используем содержимое твоего файла asteri.keystore.b64
          KEYSTORE_B64: ${{ secrets.KEYSTORE_B64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          # Очищаем строку от возможных пробелов и декодируем
          echo "$KEYSTORE_B64" | tr -d '[:space:]' | base64 --decode > asteri.keystore
          
          # Создаем файл настроек подписи
          cat > signing.gradle <<'EOF'
          android {
              signingConfigs {
                  release {
                      storeFile file("asteri.keystore")
                      storePassword System.getenv("SIGNING_STORE_PASSWORD")
                      keyAlias System.getenv("SIGNING_KEY_ALIAS")
                      keyPassword System.getenv("SIGNING_KEY_PASSWORD")
                  }
              }
              buildTypes {
                  release {
                      signingConfig signingConfigs.release
                  }
              }
          }
          EOF
          
          # Подключаем наш signing.gradle к основному build.gradle
          if ! grep -q 'signing.gradle' build.gradle; then
            echo -e "\napply from: \"signing.gradle\"" >> build.gradle
          fi

      - name: Build Release APK
        working-directory: "Сайт с тренировкой/android"
        run: ./gradlew assembleRelease
        env:
          # Прокидываем пароли в переменные окружения для Gradle
          SIGNING_STORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: "Сайт с тренировкой/android/app/build/outputs/apk/release/*.apk"
