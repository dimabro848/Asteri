name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install deps
        working-directory: "Сайт с тренировкой"
        run: npm install

      - name: Build web
        working-directory: "Сайт с тренировкой"
        run: npm run build

      - name: Add Android platform
        working-directory: "Сайт с тренировкой"
        run: |
          if [ ! -d android ]; then
            npx cap add android
          fi

      - name: Generate icons and splash
        working-directory: "Сайт с тренировкой"
        run: npx @capacitor/assets generate --android --iconBackgroundColor "#000000" --splashBackgroundColor "#000000"

      - name: Sync Capacitor
        working-directory: "Сайт с тренировкой"
        run: npx cap sync android

      - name: Build Release APK
        working-directory: "Сайт с тренировкой/android"
        run: ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: "Сайт с тренировкой/android/app/build/outputs/apk/release/app-release.apk"

