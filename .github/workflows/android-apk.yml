      - name: Prepare release signing
        working-directory: "Сайт с тренировкой/android"
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_B64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          printf "%s" "$KEYSTORE_B64" | tr -d '\n' | base64 -d > app/asteri.keystore
          ls -l app/asteri.keystore
          cat > app/signing.gradle <<'EOF'
          android {
              signingConfigs {
                  release {
                      storeFile file("app/asteri.keystore")
                      storePassword System.getenv("KEYSTORE_PASSWORD")
                      keyAlias System.getenv("KEY_ALIAS")
                      keyPassword System.getenv("KEY_PASSWORD")
                  }
              }
              buildTypes {
                  release {
                      signingConfig signingConfigs.release
                  }
              }
          }
          EOF
          if ! grep -q 'signing.gradle' app/build.gradle; then
            echo 'apply from: "signing.gradle"' >> app/build.gradle
          fi
