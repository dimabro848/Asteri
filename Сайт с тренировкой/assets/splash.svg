<svg xmlns="http://www.w3.org/2000/svg" width="2732" height="2732" viewBox="0 0 2732 2732">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#b86bff"/>
      <stop offset="1" stop-color="#ff69c6"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="28" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="2732" height="2732" fill="#000000"/>
  <text x="50%" y="56%" text-anchor="middle" font-size="1200" font-family="Arial Black, sans-serif" fill="url(#g)" filter="url(#glow)">A</text>
</svg>

